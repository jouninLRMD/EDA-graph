# Default parameters for the EDA-Graph pipeline.
# Copy and edit if you want to override the defaults.

# Acquisition / preprocessing
fs_raw: 1000              # raw sampling rate of the CASE dataset (Hz)
fs: 8                     # target sampling rate after decimation (Hz)
lowpass_hz: 1.0           # cutoff of the 4th-order Butterworth low-pass filter (Hz)
window_sec: 20.0          # length of each analysis window (s)
window_step_sec: 20.0     # step between consecutive windows (s)

# Graph construction
q_levels: 10              # number of amplitude quantisation levels Q
knn_k: 8                  # number of nearest neighbours per node
normalize: "minmax"       # "minmax" or "zscore"

# Misc
random_state: 42

# CASE video id -> categorical emotion class
class_map:
  10: 0        # Neutral (start screen)
  11: 0        # Neutral (end screen)
  1: 1         # Amused
  2: 1
  3: 2         # Bored
  4: 2
  5: 3         # Relaxed
  6: 3
  7: 4         # Scared
  8: 4
